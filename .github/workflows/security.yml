name: Security Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # full history for accurate scanning
      - name: Install gitleaks
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" | tar -xz
          install -m 0755 gitleaks /usr/local/bin/gitleaks
      - name: Run gitleaks
        run: gitleaks detect --source . --verbose --redact

  hardcoded-paths:
    name: Hardcoded path check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check for hardcoded home paths
        run: |
          set -e
          # Match /Users/username or /home/username (Unix paths, not URL path segments)
          PATTERN='(/Users|/home)/[a-zA-Z0-9_.-]{3,}/'
          EXCLUDES='\.git/|node_modules/|skills/last30days/|sources\.json|/seed/|test-run\.log'
          FOUND=$(grep -r -l -E "$PATTERN" \
            --include='*.md' --include='*.yaml' --include='*.yml' --include='*.json' \
            --include='*.sh' --include='*.py' --include='*.ts' --include='*.tsx' --include='*.js' \
            . 2>/dev/null | grep -v -E "$EXCLUDES" || true)
          if [ -n "$FOUND" ]; then
            echo "ERROR: Hardcoded home paths found. Use \$HOME or relative paths."
            echo "$FOUND" | head -20
            exit 1
          fi
          echo "No hardcoded paths found."
