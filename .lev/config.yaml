version: "1.0"

project:
  name: .agents
  namespace: agents

# Memory defaults (workspace-first recall)
memory:
  workspace:
    backend: cass+cm
    recall:
      enabled: true
      require_workspace_match: true
      context_limit: 3
      history_limit: 1

