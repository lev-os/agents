# ============================================================================
# GASTOWN INTEGRATION
# ============================================================================

[gastown]
description = "Gastown orchestration configuration for agency hub"

[gastown.discovery]
# URIs for CDO orchestration to discover agency capabilities
workflow_uri_pattern = "context://agency/workflows/{workflow-id}"
agent_uri_pattern = "context://agency/agents/{agent-id}"
config_uri_pattern = "context://agency/config/{config-id}"
pattern_uri_pattern = "context://agency/patterns/{pattern-id}"

[gastown.mayor]
description = "Agency CEO orchestrates via gastown Mayor role"
entry_agent = "agency"
delegation_strategy = "ceo_mediated_multi_specialist"

[gastown.crew]
description = "Domain agents map to gastown Crew workers"
mapping = [
  { crew = "brand-crew", agent = "brand-domain-agent" },
  { crew = "marketing-crew", agent = "marketing-domain-agent" },
  { crew = "ux-crew", agent = "ux-domain-agent" },
  { crew = "ops-crew", agent = "operations-domain-agent" },
  { crew = "hardware-crew", agent = "hardware-domain-agent" },
  { crew = "emerging-crew", agent = "emerging-domain-agent" },
]

[gastown.quality]
threshold = 0.8
gating_strategy = "confidence_based_advancement"

