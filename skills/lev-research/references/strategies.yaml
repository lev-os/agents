# Strategy definitions — maps modes to backend combinations
# Used by the router in SKILL.md to select execution plan

strategies:

  quick:
    description: Fast web lookup, first good answer wins
    backends: [brave, tavily]
    orchestration: first-success
    timeout: 30s
    when: simple factual queries, lookups, "what is X"

  full:
    description: Multi-source parallel search with cross-reference
    backends: [brave, firecrawl, perplexity]
    orchestration: parallel
    timeout: 120s
    when: needs multiple sources, verification, moderate depth

  deep:
    description: Recursive confidence loops with synthesis
    backends: [valyu, perplexity, exa]
    orchestration: parallel-then-synthesize
    timeout: 300s
    when: "research X", complex analysis, needs high confidence

  max:
    description: All backends, full synthesis, highest quality
    backends: [brave, firecrawl, perplexity, exa, valyu]
    orchestration: parallel-then-synthesize
    timeout: 600s
    when: comprehensive analysis, multi-domain, nothing less will do

  social:
    description: Social media and trending discourse
    backends: [grok, last30days]
    orchestration: parallel
    timeout: 60s
    when: Twitter/X, Reddit, sentiment, trending topics

  academic:
    description: Papers, technical content, neural search
    backends: [exa, perplexity]
    orchestration: parallel
    timeout: 120s
    when: research papers, technical deep dives, scholarly sources

# Timetravel CLI mapping (when available)
timetravel_cli:
  quick: timetravel search "<query>" --strategy quick
  full: timetravel search "<query>" --strategy full
  deep: timetravel search "<query>" --strategy deep
  max: timetravel search "<query>" --strategy max
  social: timetravel search "<query>" --strategy social
  academic: timetravel search "<query>" --strategy academic
