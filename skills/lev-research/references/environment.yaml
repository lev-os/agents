# Environment variables and storage paths for lev-research

api_keys:
  required:
    BRAVE_API_KEY: Brave Search API
    FIRECRAWL_API_KEY: Firecrawl API
    VALYU_API_KEY: Valyu API
    OPENAI_API_KEY: Oracle / GPT-5 synthesis
  optional:
    EXA_API_KEY: Exa neural search
    XAI_API_KEY: Grok / X search
    TAVILY_API_KEY: Tavily AI search
  location: ~/.env.local

storage:
  base: ~/.config/LEV/research
  sessions: ~/.config/LEV/research/sessions/{YYYY-MM-DD}/{session-id}_{slug}/
  templates: ~/.config/LEV/research/templates/
  config: ~/.config/LEV/research/config.json

session_files:
  - session.json       # metadata + state
  - queries.jsonl      # all queries issued
  - sources.jsonl      # all sources found
  - artifacts/         # raw backend outputs
  - synthesis.md       # final synthesis
  - validation.json    # output validation

session_id_format: "{YYYYMMDD}-{HHmm}_{semantic-slug}"

version_history:
  - version: 2.0.0
    date: 2026-03-22
    changes: Rewrite as YAML router. Extracted references. Under 250 lines.
  - version: 1.0.2
    date: 2026-03-07
    changes: Removed obsolete preflight guidance and stale routing references
  - version: 1.0.0
    date: 2026-02-09
    changes: Timetravel adapter library integration, 10 adapters, 6 strategies
  - version: 0.9.0
    date: 2026-02-03
    changes: Unified skill, XDG storage, validation, CLI tools
