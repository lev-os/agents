name: research
version: 2.1.0
description: "Use when any research, search, or information gathering is needed"
entry: classify

nodes:
  classify:
    description: "Detect query complexity and select strategy"
    content: nodes/classify.md
    routes:
      quick: "search, lookup, find, what is"
      social: "twitter, reddit, trending, sentiment"
      academic: "paper, arxiv, academic, scholarly"
      deep: "research, deep, comprehensive, analyze"
      max: "complete analysis, exhaustive, all angles"
    validation:
      rule: "exactly one strategy selected from: quick, social, academic, deep, max"
    on_failure: "Default to quick. Never stall asking the user."

  quick:
    description: "Brave + Tavily, first-success"
    content: nodes/quick.md
    requires: [classify]
    terminal: true
    validation:
      rule: "at least one URL in response"

  social:
    description: "Grok + last30days, parallel"
    content: nodes/social.md
    requires: [classify]
    terminal: true
    validation:
      rule: "results from at least one social platform"

  academic:
    description: "Exa + Perplexity, parallel then synthesize"
    content: nodes/academic.md
    requires: [classify]
    next: synthesize

  deep:
    description: "Valyu + Perplexity + Exa, parallel then synthesize"
    content: nodes/deep.md
    requires: [classify]
    next: synthesize

  max:
    description: "All backends, parallel then synthesize"
    content: nodes/max.md
    requires: [classify]
    next: synthesize

  synthesize:
    description: "Combine results into cited synthesis"
    content: nodes/synthesize.md
    requires: [academic, deep, max]
    terminal: true
    validation:
      rule: "every finding links to a source URL"
    on_failure: "Remove unsourced findings. Move to open questions."

anti_patterns:
  - excuse: "I'll just use Brave directly"
    reality: "Classify first. Signal words decide the strategy."
    priority: discipline
    triggers:
      - "just search Brave for it"
      - "skip classification, I know what tool to use"
      - "let me just do a quick Brave search"
      - "don't overthink it, just search"
  - excuse: "I already know the answer"
    reality: "Training data is not a search result. No URLs = no evidence."
    priority: discipline
    triggers:
      - "I already know the answer to this"
      - "no need to search, I can tell you"
      - "from what I know..."
      - "I'm pretty sure it's X"
      - "skip the search, just answer"
  - excuse: "One source is enough"
    reality: "Quick = first-success. Deep/max require all backends."
    priority: discipline
    triggers:
      - "that first result is fine"
      - "one source is plenty"
      - "we already found something"
      - "no need to check more sources"
  - excuse: "I'll synthesize later"
    reality: "Synthesis happens in the same response."
    priority: discipline
    triggers:
      - "I'll combine the results later"
      - "just dump the raw results for now"
      - "synthesis can wait"
      - "give me the links and I'll read them"
  - excuse: "The MCP tool failed so I'll answer from context"
    reality: "Fail over to CLI. Then next backend. Report failure only when ALL exhausted."
    priority: safety
    triggers:
      - "the tool timed out, I'll just answer from memory"
      - "that API is down, let me just tell you"
      - "search failed, but I know the answer anyway"
      - "MCP errored out, here's what I think"
      - "let's skip the search since the tool isn't working"
